app = "lofp"
primary_region = "ord"

[build]
  # VITE_GOOGLE_CLIENT_ID is passed at deploy time:
  # fly deploy --build-arg VITE_GOOGLE_CLIENT_ID=your-client-id.apps.googleusercontent.com

[env]
  LOFP_CONFIG = "config/prod.yaml"
  LOFP_STATIC_DIR = "/app/static"
  MONGODB_DATABASE = "lofp"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 4000

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 4001
    handlers = ["tls"]

[[services]]
  protocol = "tcp"
  internal_port = 4022

  [[services.ports]]
    port = 4022

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
